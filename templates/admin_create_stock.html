<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Stock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .pill{ border-radius: 999px; font-weight: 600; }
  </style>
</head>
<body class="bg-light">
  <div class="container py-4" style="max-width: 760px;">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-3">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} mb-2">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h1 class="h4 mb-1">Create New Stock</h1>
        <div class="text-muted small">Company name, ticker, volume, and initial price</div>
      </div>
      <a class="btn btn-outline-secondary btn-sm pill" href="{{ url_for('home') }}">Back to Home</a>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Company name</label>
              <input class="form-control" name="company_name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Ticker</label>
              <input class="form-control" name="ticker" maxlength="10" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Volume</label>
              <input class="form-control" name="volume" type="number" min="1" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Initial price</label>
              <input class="form-control" name="initial_price" placeholder="100.00" required>
            </div>
          </div>

          <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary pill" type="submit">Create stock</button>
            <a class="btn btn-outline-secondary pill" href="{{ url_for('home') }}">Cancel</a>
          </div>
        </form>
      </div>
    </div>

  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h1 class="h4 mb-3">Create account</h1>

            {% if request.args.get('error') == 'exists' %}
              <div class="alert alert-warning">
                Username already exists.
                <a href="{{ url_for('login') }}" class="alert-link">Click here to login</a>.
              </div>
            {% endif %}

            {% if request.args.get('error') == 'email' %}
              <div class="alert alert-warning">
                Email already exists.
                <a href="{{ url_for('login') }}" class="alert-link">Click here to login</a>.
              </div>
            {% endif %}

            <form method="post" action="{{ url_for('register') }}">
              <div class="mb-3">
                <label class="form-label">Full name</label>
                <input class="form-control" type="text" name="full_name" required autofocus>
              </div>

              <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" type="text" name="username" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required>
              </div>

              <button class="btn btn-success w-100" type="submit">Create account</button>
            </form>

            <div class="mt-3 text-center">
              <span class="text-muted">Already have an account?</span>
              <a href="{{ url_for('login') }}" class="text-decoration-none">Login</a>
            </div>
          </div>
        </div>

        <p class="text-center text-muted mt-3 mb-0 small">Stock Trading System</p>
      </div>
    </div>
  </div>
</body>
</html>
